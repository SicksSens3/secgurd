name: Refresh community malicious-URL list

# Auto-updates communitysavedMALURLS.txt from a free public malicious-URL feed.
# Runs in GitHub's cloud (NOT on any endpoint), commits the refreshed file to the repo.
# Your endpoints stay offline - they just get the new URLs on the next `git pull`.

on:
  schedule:
    - cron: '30 6 * * *'        # daily at 06:30 UTC (30 min after the IOC-hash refresh)
  workflow_dispatch:            # also allow manual "Run workflow" from the Actions tab

permissions:
  contents: write               # needed to commit the refreshed file back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Download and build community malicious-URL list
        run: |
          set -euo pipefail
          OUT="communitysavedMALURLS.txt"
          TMP="$(mktemp)"

          # Only keep URLs first seen within this many days (drops stale long-lived infra).
          MAXAGE_DAYS=90
          CUTOFF="$(date -u -d "${MAXAGE_DAYS} days ago" '+%Y-%m-%d')"

          # --- Source: abuse.ch URLhaus "online" URL export (free, no API key) ---
          # https://urlhaus.abuse.ch/  -> a CSV of URLs currently serving malware. We keep only
          # the "online" feed (dead URLs are useless for hunting) and label each with its
          # threat/tags so a match tells you WHAT it is.
          echo "Downloading URLhaus online URL export..."
          curl -fsSL "https://urlhaus.abuse.ch/downloads/csv_online/" -o online.csv || {
            echo "Download failed; leaving the existing list untouched."
            exit 0
          }

          # URLhaus CSV columns (every field is double-quoted, comma-separated):
          #   1 id, 2 dateadded, 3 url, 4 url_status, 5 last_online, 6 threat, 7 tags,
          #   8 urlhaus_link, 9 reporter
          # We want column 3 (url), 2 (dateadded, for the time filter) and a label from 6/7.
          # URLs legitimately contain commas (query strings), so we parse with gawk FPAT
          # (quote-aware field splitting) rather than a naive split on ',', and we keep the
          # LABEL comma-free so the consumer can recover <url> by splitting on the LAST comma.
          #
          # AGGRESSIVE SHRINK: the raw feed is ~15k URLs, but ~87% are things secgurd ALREADY
          # flags on its own heuristics (module 10 Test-SuspiciousUrl) - so listing them adds
          # nothing. We drop every entry the tool would already catch, keep only recent ones,
          # and emit ONE representative URL per host (module 10 matches on host too, so extra
          # URLs on an already-listed host are redundant). Net: ~15k -> a few hundred hosts
          # that are confirmed-malicious on otherwise normal-looking domains - the real value.
          {
            echo "# secgurd community malicious-URL list"
            echo "# Auto-generated from abuse.ch URLhaus online export (https://urlhaus.abuse.ch/)"
            echo "# Filtered: drop URLs secgurd already flags by heuristic (direct payload downloads,"
            echo "#   raw-IP hosts, GitHub, known C2/file-drop infra, shorteners, high-abuse TLDs,"
            echo "#   punycode); keep entries added in the last ${MAXAGE_DAYS} days; ONE URL per host."
            echo "# Updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "# Format: <url>,<threat/tags>   (label is comma-free; split URL on the LAST comma)"
            echo "#"
            gawk -v FPAT='"[^"]*"|[^,]*' -v CUT="$CUTOFF" '
              /^#/ { next }
              {
                url=$3; dateadded=$2; threat=$6; tags=$7;
                gsub(/^"|"$/,"",url); gsub(/^"|"$/,"",dateadded);
                gsub(/^"|"$/,"",threat); gsub(/^"|"$/,"",tags);
                if (url !~ /^https?:\/\//) next;

                # time filter: keep only URLs first seen on/after the cutoff (ISO dates sort lexically)
                if (substr(dateadded,1,10) < CUT) next;

                lu = tolower(url);

                # --- drop everything secgurd already flags by heuristic (redundant) ---
                if (lu ~ /\.(exe|dll|bin|scr|msi|ps1|bat|cmd|hta|vbs|jse?|wsf|jar|apk|iso|img|lnk|ace|7z)(\?|#|$)/) next;   # direct payload download (HIGH)
                if (lu ~ /^https?:\/\/[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+([:\/]|$)/) next;                                        # raw IP host (HIGH)
                if (lu ~ /(githubusercontent|github\.io|github\.com|gist\.)/) next;                                          # GitHub-hosted (already flagged)
                if (lu ~ /(cdn\.discordapp\.com|discord(app)?\.com\/api\/webhooks|pastebin\.com\/raw|paste\.ee|transfer\.sh|anonfiles|gofile\.io|mega\.(nz|io)|mediafire|file\.io|0x0\.st|tmpfiles|ngrok\.(io|app|dev)|trycloudflare|\.workers\.dev|\.r2\.dev|t\.me\/)/) next;   # known C2/file-drop (HIGH)
                if (lu ~ /:\/\/(bit\.ly|tinyurl\.com|goo\.gl|t\.co|is\.gd|cutt\.ly|rebrand\.ly|ow\.ly|rb\.gy|shorturl\.at|tiny\.cc|bit\.do|s\.id)\//) next;   # URL shortener (MED)
                if (lu ~ /:\/\/[^\/]*\.(tk|top|xyz|gq|ml|cf|work|click|country|kim|men|loan|download|zip|mov|rest|cfd|sbs|lol|quest)([\/:]|$)/) next;          # high-abuse TLD (MED)
                if (lu ~ /:\/\/xn--/) next;                                                                                  # punycode host (MED)

                # dedup: one representative URL per host
                h = lu; sub(/^https?:\/\//,"",h); sub(/[\/:?#].*$/,"",h);
                if (h in seen) next;
                seen[h]=1;

                label=threat;
                if (label=="" || label=="None") label=tags;
                if (label=="" || label=="None") label="URLhaus";
                gsub(/,/,";",label);
                print url "," label;
              }' online.csv \
              | sort -u
          } > "$TMP"

          # Sanity: only replace the committed file if we actually parsed some URLs.
          URLCOUNT=$(grep -cE '^https?://' "$TMP" || true)
          echo "Parsed $URLCOUNT URLs."
          if [ "$URLCOUNT" -gt 0 ]; then
            mv "$TMP" "$OUT"
            echo "Wrote $OUT"
          else
            echo "No URLs parsed; keeping existing $OUT unchanged."
          fi

      - name: Commit changes if the list changed
        run: |
          set -euo pipefail
          git config user.name  "secgurd-ioc-bot"
          git config user.email "secgurd-ioc-bot@users.noreply.github.com"
          if git diff --quiet -- communitysavedMALURLS.txt; then
            echo "No changes to commit."
          else
            git add communitysavedMALURLS.txt
            git commit -m "Auto-refresh community malicious-URL list ($(date -u '+%Y-%m-%d'))"
            git push
            echo "Committed updated community malicious-URL list."
          fi
